<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Que país é esse? </title>
</head>
<body>
    <h1> Brasileiro ou Estrangeiro?  </h1>
    De qual país você vem ? <input type="text" id="txtnac" >
    <input type="button" value="Verificar" onclick="descobrir()">
    <div id="res"> </div>
    <script>
        function descobrir() {
            var txtn = window.document.querySelector('input#txtnac')
            var res = window.document.getElementById('res')
            res.innerHTML = '<p> Sua nacionalidade é <strong>' + txtn.value + '</strong> </p>' 
            if (txtn.value != 'Brasil') {
                res.innerHTML += 'Então você é Estrangeiro'
            }
        }
    </script>
    
</body>
</html>
